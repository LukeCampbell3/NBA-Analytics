<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBA Type Cards</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="styles.css?v=17">
</head>
<body>
    <button id="siteMenuButton" class="site-menu-button" aria-label="Open site navigation" aria-controls="siteNavDrawer" aria-expanded="false">
        <span class="site-menu-icon">&#9776;</span>
    </button>
    <div id="siteNavOverlay" class="site-nav-overlay"></div>
    <aside id="siteNavDrawer" class="site-nav-drawer" aria-label="Site navigation">
        <div class="site-nav-head">
            <div class="site-nav-title">Navigate</div>
            <button id="siteNavClose" class="site-nav-close" aria-label="Close site navigation">&times;</button>
        </div>
        <nav class="site-nav-links">
            <a class="site-nav-link" href="index.html">Home</a>
            <a class="site-nav-link" href="college.html">College</a>
            <a class="site-nav-link" href="predictor.html">Predictor</a>
            <a class="site-nav-link" href="about.html">About</a>
        </nav>
        <div class="site-nav-footer">
            <button id="themeToggleButton" class="theme-toggle-radial" aria-label="Toggle dark mode" title="Toggle dark/light mode">&#9680;</button>
        </div>
    </aside>
    <div id="app">
        <!-- Header -->
        <header class="header">
            <div class="container">
                <div class="header-layout">
                    <div class="header-copy">
                        <h1 class="logo">NBA Type Deck</h1>
                        <p class="tagline">Player Archetypes, Context, and Value Signals</p>
                    </div>
                    <div class="header-distribution-panel">
                        <div class="distribution-title-row">
                            <h3>Player Value Distribution</h3>
                            <span class="distribution-metric-wrap">
                                <span id="distributionMetricLabel" class="distribution-metric-label">Showing: Player Value</span>
                                <a class="distribution-info-link" href="about.html" title="Learn about these metrics" aria-label="Learn about these metrics">i</a>
                            </span>
                            <span id="distributionCount" class="distribution-count">0 players</span>
                        </div>
                        <canvas id="valueDistributionChart" width="860" height="180" aria-label="Player value distribution chart"></canvas>
                        <div id="distributionTooltip" class="distribution-tooltip" style="display:none;"></div>
                    </div>
                </div>
            </div>
        </header>

        <!-- Filters -->
        <section class="filters">
            <div class="container">
                <div class="filter-group">
                    <input type="text" id="searchInput" placeholder="Search players..." class="search-input">
                </div>
                
                <div class="filter-group">
                    <label>Archetype:</label>
                    <select id="archetypeFilter" class="filter-select">
                        <option value="">All Archetypes</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label>Usage:</label>
                    <select id="usageFilter" class="filter-select">
                        <option value="">All Usage</option>
                        <option value="high">High</option>
                        <option value="medium">Medium</option>
                        <option value="low">Low</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label>Team:</label>
                    <select id="teamFilter" class="filter-select">
                        <option value="">All Teams</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label>Sort By:</label>
                    <select id="sortBy" class="filter-select">
                        <option value="name" selected>Name</option>
                        <option value="best_available">Best Available (Validated)</option>
                        <option value="team_fit">Team Fit (High to Low)</option>
                        <option value="age">Age (Young to Old)</option>
                        <option value="wins">Wins Added</option>
                        <option value="breakout">Breakout Score</option>
                    </select>
                </div>

                <button id="resetFilters" class="btn-secondary">Reset Filters</button>
            </div>
        </section>

        <!-- Player Cards Grid -->
        <section class="player-grid">
            <div class="container">
                <div id="playerCards" class="cards-container">
                    <!-- Player cards will be dynamically inserted here -->
                </div>
                <div id="noResults" class="no-results" style="display: none;">
                    <p>No players found matching your filters.</p>
                </div>
                <div id="loading" class="loading">
                    <p>Loading player data...</p>
                </div>
            </div>
        </section>

        <!-- Player Detail Modal -->
        <div id="playerModal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <div id="modalBody">
                    <!-- Player details will be inserted here -->
                </div>
            </div>
        </div>
    </div>

    <script src="nav.js?v=7"></script>
    <script src="app.js?v=44"></script>
</body>
</html>

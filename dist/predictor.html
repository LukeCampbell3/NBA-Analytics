<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Predictor - NBA Analytics</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="styles.css?v=19">
</head>
<body>
    <button id="siteMenuButton" class="site-menu-button" aria-label="Open site navigation" aria-controls="siteNavDrawer" aria-expanded="false">
        <span class="site-menu-icon">&#9776;</span>
    </button>
    <div id="siteNavOverlay" class="site-nav-overlay"></div>
    <aside id="siteNavDrawer" class="site-nav-drawer" aria-label="Site navigation">
        <div class="site-nav-head">
            <div class="site-nav-title">Navigate</div>
            <button id="siteNavClose" class="site-nav-close" aria-label="Close site navigation">&times;</button>
        </div>
        <nav class="site-nav-links">
            <a class="site-nav-link" href="index.html">Home</a>
            <a class="site-nav-link" href="predictor.html">Predictor</a>
            <a class="site-nav-link" href="college.html">College</a>
            <a class="site-nav-link" href="about.html">About</a>
        </nav>
        <div class="site-nav-footer">
            <button id="themeToggleButton" class="theme-toggle-radial" aria-label="Toggle dark mode" title="Toggle dark/light mode">&#9680;</button>
        </div>
    </aside>

    <main class="predictions-page">
        <section class="predictions-hero">
            <div class="container">
                <div class="predictions-hero-grid">
                    <div class="predictions-hero-copy">
                        <p class="predictions-kicker">Daily Prediction Engine</p>
                        <h1>NBA Player Predictions</h1>
                        <p class="predictions-subtitle">
                            Real-time predictions for today's NBA games using our hybrid LSTM + CatBoost ensemble model.
                        </p>
                        <div id="predictionsMeta" class="predictions-meta"></div>
                    </div>
                    <div class="predictions-hero-panel">
                        <div id="predictionsSummary" class="predictions-summary-grid"></div>
                    </div>
                </div>
            </div>
        </section>

        <section class="predictions-toolbar">
            <div class="container predictions-toolbar-inner">
                <input id="predictionSearch" class="search-input prediction-search" type="search" placeholder="Search player or prop...">
                <select id="predictionTargetFilter" class="filter-select">
                    <option value="">All Targets</option>
                    <option value="PTS">PTS</option>
                    <option value="TRB">TRB</option>
                    <option value="AST">AST</option>
                </select>
                <select id="predictionRecommendationFilter" class="filter-select">
                    <option value="">All Tiers</option>
                    <option value="consider">Consider</option>
                    <option value="strong">Strong</option>
                    <option value="elite">Elite</option>
                </select>
            </div>
        </section>

        <section class="predictions-board">
            <div class="container">
                <div id="predictionStatus" class="predictions-status">Loading daily predictions...</div>
                <div id="predictionSource" class="prediction-source-card"></div>
                <div id="predictionCards" class="prediction-cards"></div>
                <div id="predictionEmpty" class="no-results" style="display:none;">
                    <p>No predictions match the current filters.</p>
                </div>
            </div>
        </section>
    </main>

    <script src="nav.js?v=7"></script>
    <script src="predictor.js?v=1"></script>
</body>
</html>
